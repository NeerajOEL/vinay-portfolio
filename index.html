// ── HOOKS ─────────────────────────────────────────────────────────────────────

function useReveal(delay=0, dir='up') {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current; if(!el) return;
    const cls = dir==='left'?'reveal-left':dir==='right'?'reveal-right':'reveal';
    el.classList.add(cls);
    const obs = new IntersectionObserver(([e]) => {
      if(e.isIntersecting){ setTimeout(()=>el.classList.add('visible'), delay); obs.unobserve(el); }
    },{threshold:.08,rootMargin:'0px 0px -50px 0px'});
    obs.observe(el);
    return ()=>obs.disconnect();
  },[delay,dir]);
  return ref;
}

// ── ANIMATED COUNTER ──────────────────────────────────────────────────────────

function Counter({ target, suffix, duration=2000 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if(e.isIntersecting && !started.current) {
        started.current = true;
        const start = Date.now();
        const tick = () => {
          const elapsed = Date.now() - start;
          const progress = Math.min(elapsed / duration, 1);
          const ease = 1 - Math.pow(1 - progress, 3);
          setVal(Math.floor(ease * target));
          if(progress < 1) requestAnimationFrame(tick);
          else setVal(target);
        };
        tick();
        obs.unobserve(e.target);
      }
    },{threshold:.3});
    if(ref.current) obs.observe(ref.current);
    return ()=>obs.disconnect();
  },[target, duration]);
  return <span ref={ref}>{val.toLocaleString()}{suffix}</span>;
}

// ── CURSOR ────────────────────────────────────────────────────────────────────

function Cursor() {
  const dot=useRef(null), ring=useRef(null);
  const pos=useRef({x:0,y:0}), rPos=useRef({x:0,y:0});
  useEffect(()=>{
    const move=e=>{pos.current={x:e.clientX,y:e.clientY};};
    window.addEventListener('mousemove',move);
    let raf;
    const tick=()=>{
      rPos.current.x+=(pos.current.x-rPos.current.x)*.12;
      rPos.current.y+=(pos.current.y-rPos.current.y)*.12;
      if(dot.current){dot.current.style.left=pos.current.x+'px';dot.current.style.top=pos.current.y+'px';}
      if(ring.current){ring.current.style.left=rPos.current.x+'px';ring.current.style.top=rPos.current.y+'px';}
      raf=requestAnimationFrame(tick);
    };
    tick();
    const big=()=>{if(ring.current){ring.current.style.width='48px';ring.current.style.height='48px';}};
    const small=()=>{if(ring.current){ring.current.style.width='34px';ring.current.style.height='34px';}};
    document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,[data-hover]'))big();else small();});
    return()=>{window.removeEventListener('mousemove',move);cancelAnimationFrame(raf);};
  },[]);
  return(
    <><div ref={dot} id="cur-dot"/><div ref={ring} id="cur-ring"/></>
  );
}

// ── PARTICLES (MONEY/SALES THEMED) ────────────────────────────────────────────

function Particles() {
  const canvasRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current, ctx=c.getContext('2d');
    let pts=[],raf;
    const resize=()=>{c.width=window.innerWidth;c.height=window.innerHeight;};
    resize(); window.addEventListener('resize',resize);
    class P{
      constructor(){this.reset();}
      reset(){
        this.x=Math.random()*c.width; this.y=Math.random()*c.height;
        this.s=Math.random()*1.8+0.4; this.vx=(Math.random()-.5)*.2; this.vy=(Math.random()-.5)*.2;
        this.op=Math.random()*.25+.05;
        this.col=Math.random()>.6?'#C9A84C':Math.random()>.5?'#E8C96A':'#F0EDE8';
      }
      update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>c.width||this.y<0||this.y>c.height)this.reset();}
      draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fillStyle=this.col;ctx.globalAlpha=this.op;ctx.fill();}
    }
    for(let i=0;i<70;i++)pts.push(new P());
    const loop=()=>{
      ctx.clearRect(0,0,c.width,c.height);ctx.globalAlpha=1;
      pts.forEach(p=>{p.update();p.draw();});
      for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<90){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle='#C9A84C';ctx.globalAlpha=(1-d/90)*.06;ctx.lineWidth=.5;ctx.stroke();}
      }
      ctx.globalAlpha=1;raf=requestAnimationFrame(loop);
    };
    loop();
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none"/>;
}

// ── SKILLS ────────────────────────────────────────────────────────────────────

function Skills() {
  const {dark}=useTheme();
  const titleRef=useReveal();

  const skillRef=useRef(null);
  const txt=dark?'#A09880':'#5A4A2A';
  const txtP=dark?'#F0EDE8':'#1A1208';

  useEffect(()=>{
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){setVisible(true);obs.unobserve(e.target);}},{threshold:.2});
    if(skillRef.current) obs.observe(skillRef.current);
    return()=>obs.disconnect();
  },[]);

  return(
    <section id="skills" className="py-24 light-alt">
      <div className="max-w-7xl mx-auto px-6">
        <div ref={titleRef} className="reveal mb-12">
          <p className="font-mono text-xs tracking-[0.2em] uppercase mb-3 flex items-center gap-3" style={{color:'#C9A84C'}}>
            <span className="w-8 h-px" style={{background:'#C9A84C'}}/>Core Competencies
          </p>
          <h2 className="font-display text-4xl md:text-5xl font-bold" style={{color:txtP}}>
            Mastered through <span className="text-gold">two decades.</span>
          </h2>
        </div>

        <div ref={skillRef} className="grid md:grid-cols-2 gap-5">
          {COMPETENCIES.map((sk,i)=>(
            <div key={i} className="p-5 rounded-2xl" style={{border:'1px solid rgba(201,168,76,0.12)',background:'rgba(201,168,76,0.03)'}}>
              <div className="flex items-center justify-between mb-3">
                <span className="font-sans text-sm font-medium" style={{color:txtP}}>{sk.name}</span>
                <span className="font-mono text-xs font-bold" style={{color:sk.color}}>{sk.level}%</span>
              </div>
              <div className="h-1.5 rounded-full overflow-hidden" style={{background:'rgba(201,168,76,0.1)'}}>
                <div className="h-full rounded-full"
                  style={{
                    width:visible?`${sk.level}%`:'0%',
                    background:`linear-gradient(90deg,${sk.color}80,${sk.color})`,
                    transition:`width .9s ${i*.1}s cubic-bezier(0.34,1.1,0.64,1)`,
                  }}/>
              </div>
            </div>
          ))}
        </div>

        {/* Languages + Tools */}
        <div className="grid md:grid-cols-2 gap-6 mt-8">
          <div className="p-6 rounded-2xl" style={{border:'1px solid rgba(201,168,76,0.12)',background:'rgba(201,168,76,0.03)'}}>
            <div className="font-mono text-[0.65rem] tracking-widest uppercase mb-4" style={{color:'#C9A84C'}}>Languages</div>
            <div className="space-y-3">
              {[{l:'Hindi',v:'Advanced (C1)'},{l:'Bhojpuri',v:'Advanced (C1)'},{l:'English',v:'Upper Intermediate (B2)'}].map(lang=>(
                <div key={lang.l} className="flex items-center justify-between">
                  <span className="font-sans text-sm" style={{color:txtP}}>{lang.l}</span>
                  <span className="font-mono text-[0.62rem] px-2 py-0.5 rounded" style={{background:'rgba(201,168,76,0.1)',color:'#C9A84C',border:'1px solid rgba(201,168,76,0.25)'}}>{lang.v}</span>
                </div>
              ))}

          </div>
          <div className="p-6 rounded-2xl" style={{border:'1px solid rgba(201,168,76,0.12)',background:'rgba(201,168,76,0.03)'}}>
            <div className="font-mono text-[0.65rem] tracking-widest uppercase mb-4" style={{color:'#C9A84C'}}>Tools & Platforms</div>

// ── FLOATING DOWNLOAD ─────────────────────────────────────────────────────────

function FloatingDownload() {
  const [visible,setVisible]=useState(false);
  useEffect(()=>{
    const fn=()=>setVisible(window.scrollY>400);
    window.addEventListener('scroll',fn);
    return()=>window.removeEventListener('scroll',fn);
  },[]);
  return(
    <a href="#" onClick={e=>e.preventDefault()} title="Download Resume"
      className="dl-btn"
      style={{
        position:'fixed',bottom:'2rem',right:'2rem',zIndex:60,
        opacity:visible?1:0,transform:visible?'translateY(0) scale(1)':'translateY(12px) scale(0.9)',
        transition:'opacity .3s,transform .3s',pointerEvents:visible?'auto':'none',
        padding:'10px 18px',fontSize:'0.75rem',borderRadius:'8px',
        boxShadow:'0 4px 20px rgba(201,168,76,0.25)',
      }}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download CV
    </a>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────

function App() {
  const [dark,setDark]=useState(true);
  const toggle=()=>{
    setDark(prev=>{
      const next=!prev;
      document.body.classList.toggle('light',!next);
      return next;
    });
  };
  useEffect(()=>{document.body.classList.toggle('light',!dark);},[]);

  return(
    <ThemeCtx.Provider value={{dark,toggle}}>
      <Cursor/>
      <Navbar/>
      <FloatingDownload/>
      <main>
        <Hero/>
        <About/>
        <RevenueChart/>
        <Experience/>
        <Awards/>
        <Skills/>
        <Contact/>
      </main>
      <Footer/>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
